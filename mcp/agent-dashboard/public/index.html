<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Harness Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Harness control plane</p>
          <h1>Pipeline dashboard</h1>
          <p class="lede">
            Live view of batches, pipelines, workers, blockers, logs, and safe path actions.
          </p>
        </div>
        <div class="filters">
          <label>
            Repo filter
            <input id="repoFilter" type="text" placeholder="/absolute/path/to/repo" />
          </label>
          <div class="actions">
            <button id="refreshButton" type="button">Refresh</button>
            <button id="clearButton" type="button" class="secondary">Clear</button>
          </div>
        </div>
      </header>

      <section class="stats" id="stats"></section>
      <section class="health" id="health"></section>
      <section class="blockers" id="blockers"></section>

      <main class="grid">
        <section class="panel">
          <div class="panel-head">
            <h2>Batches</h2>
            <span id="batchCount" class="muted"></span>
          </div>
          <div id="batches" class="cards"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Pipelines</h2>
            <span id="pipelineCount" class="muted"></span>
          </div>
          <div id="pipelines" class="cards"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Workers</h2>
            <span id="workerCount" class="muted"></span>
          </div>
          <div id="workers" class="cards"></div>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
